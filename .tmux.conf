### Appearance {{{
    ### vim {{{
        # For some inexplicable reason, these two magic lines are needed to
        # make vim colorschemes work within a tmux pane. It's ~magic~ ;_;
        set -g default-terminal              'screen-256color'
        set -g terminal-overrides            ',xterm-256color:Tc'
    ### }}}
    ### Status bar {{{
        set-option -g base-index             1
        set-option -g pane-base-index        1
        set-option -g status-position        bottom
        setw -g window-status-format         "#[bg=colour241,fg=colour0,noreverse]█▓░ #W "
        setw -g window-status-current-format "#[bg=colour66,fg=colour0,noreverse]█▓░ #W "
        set  -g status-bg                    colour0
        set  -g status-fg                    colour6
    ### }}}
### }}}
### Global {{{
### }}}
### Copy Mode {{{
    set-window-option -g mode-keys vi
### }}}
### Plugins {{{
    # List of plugins
    set -g @plugin 'tmux-plugins/tpm'
    set -g @plugin 'tmux-plugins/tmux-sensible'
    set -g @plugin 'tmux-plugins/tmux-yank'
    set -g @plugin 'tmux-plugins/tmux-pain-control'
    set -g @plugin 'tmux-plugins/tmux-resurrect'
    set -g @plugin 'tmux-plugins/tmux-continuum'
    set -g @plugin 'tmux-plugins/tmux-sessionist'
    set -g @plugin 'tmux-plugins/tmux-open'
    set -g @plugin 'Morantron/tmux-fingers'
### }}}
### Initialize tmux plugin manager {{{
    run -b '~/.tmux/plugins/tpm/tpm'
### }}}

